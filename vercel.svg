import { prisma } from '@/lib/prisma'
import PagamentoBrick from '@/components/PagamentoBrick'

export const dynamic = 'force-dynamic'

export default async function PaginaPagamento({
  params,
}: {
  params: Promise<{ bookingId: string }>
}) {
  const { bookingId } = await params

  const booking = await prisma.booking.findUnique({
    where: { id: bookingId },
    include: { pet: true, user: true },
  })

  if (!booking) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-stone-50 px-4">
        <div className="text-center max-w-sm">
          <h1 className="text-xl font-bold text-stone-900">Reserva não encontrada</h1>
          <p className="text-stone-500 text-sm mt-2">
            Verifique se o link está correto ou entre em contato conosco pelo WhatsApp.
          </p>
        </div>
      </div>
    )
  }

  return (
    <div className="min-h-screen bg-stone-50 px-4 py-10">
      <div className="max-w-md mx-auto bg-white rounded-3xl shadow-xl border border-stone-100 p-6">
        <h1 className="text-2xl font-black text-stone-900 tracking-tighter mb-1">
          CÃO<span className="text-teal-700">DOMÍNIO</span>
        </h1>
        <p className="text-stone-500 text-sm mb-6">Pagamento da hospedagem de {booking.pet.name}</p>

        <div className="bg-stone-50 rounded-2xl p-4 mb-6 border border-stone-100">
          <div className="flex justify-between text-sm text-stone-600 mb-1">
            <span>Check-in</span>
            <span>{booking.checkIn.toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</span>
          </div>
          <div className="flex justify-between text-sm text-stone-600 mb-3">
            <span>Check-out</span>
            <span>{booking.checkOut.toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</span>
          </div>
          <div className="flex justify-between items-center border-t border-stone-200 pt-3">
            <span className="text-xs font-bold uppercase text-stone-500">Total</span>
            <span className="text-xl font-black text-teal-700">R$ {booking.totalPrice.toFixed(2)}</span>
          </div>
        </div>

        {booking.status === 'CONFIRMADA' ? (
          <div className="text-center py-10">
            <div className="text-5xl mb-4">✅</div>
            <h3 className="text-lg font-bold text-stone-900">Esta reserva já está paga e confirmada!</h3>
          </div>
        ) : (
          <PagamentoBrick bookingId={booking.id} amount={booking.totalPrice} payerEmail={booking.user.email} />
        )}
      </div>
    </div>
  )
}
